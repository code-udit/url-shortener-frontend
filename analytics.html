<!DOCTYPE html>
<html>
<head>
  <title>Analytics — Shortify</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrapper">
    <nav class="navbar">
      <div class="logo">Shortify</div>
      <a href="/" style="color:white;text-decoration:none;">Home</a>
    </nav>

    <div class="hero">
      <h1>📊 Link Analytics</h1>

      <div class="analytics-card">
        <p><strong>Short Code:</strong> <span id="code"></span></p>
        <p><strong>Original URL:</strong></p>
        <p id="originalUrl" class="url-box"></p>
        <p><strong>Total Clicks:</strong> <span id="clicks"></span></p>
        <p><strong>Created At:</strong> <span id="createdAt"></span></p>
      </div>
    </div>
  </div>

  <script src="analytics.js"></script>
</body>
</html>
